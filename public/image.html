<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="image.css"/>
    <link rel="icon" href="favicon.svg">
</head>
<body>

    <div class="container">
        <header class="header"> 
            <div class="logo-wrapper">

                <div class="logo">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h1>AI Image Generator</h1>
            </div>

            <div class="header-controls">  
                
                 <a href="index.html" class="back-btn">Back</a>
            
            <div id="user-button"></div>

            </div>
        </header>


        <div class="main-content">
            <form action="#" class="prompt-form">

                <div class="prompt-container">
                    <textarea  class="prompt-input" placeholder="Describe your imagination...." required autofocus></textarea>
                    <button type="button" class="prompt-btn">
                        <i class="fa-solid fa-dice"></i>

                    </button>
                </div>



                <div class="prompt-actions"> 

                    <div class="select-wrapper">

                        <select class="custom-select" id="model-select" required>

                            <option value="" disabled>Choose Model</option>
                            <option value="black-forest-labs/flux.1-dev">FLUX.1-dev</option>
                            <option value="black-forest-labs/flux.1-schnell" selected>FLUX.1-schnell</option> 
                            <option value="stabilityai/stable-diffusion-3.5-large" disabled>Stable Diffusion 3.5 [NA]</option> <!-- model only available to run locally no cloud API unfortunately. learned the hard way ! -->

                        </select>
                    </div>



                    <div class="select-wrapper">

                        <select class="custom-select" id="count-select" required>

                            <option value="" select disabled>Image Count</option>
                            <option value="1">1 Image</option>
                            <option value="2" selected>2 Image</option>
                            <option value="3">3 Image</option>
                            <option value="4">4 Image</option>

                        </select>
                    </div>



                     <div class="select-wrapper">

                        <select class="custom-select" id="ratio-select"  required>

                            <option value="" select disabled>Aspect Ratio</option>
                            <option value="1">Square (1:1)</option>
                            <option value="16/9">Landscape (16:9)</option>
                            <option value="9/16">Portrait (9:16)</option>
            

                        </select>
                    </div>

                    <button type=submit class="generate-btn">
                        <i class="fa-solidfa-wand-sparkles">Generate Image</i>
                    </button>

                </div>

                    <!-- Final output image gallery grid (now nowthing cuz js makes cards dynamically)-->  
                    <div class="gallery-grid">

                    </div>

                
            </form>
        </div>

    </div>

    <script src="image.js"> </script>

    <script
  defer
  crossorigin="anonymous"
  src="https://dynamic-peacock-66.clerk.accounts.dev/npm/@clerk/ui@1/dist/ui.browser.js"
  type="text/javascript"></script>

<script
  defer
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_ZHluYW1pYy1wZWFjb2NrLTY2LmNsZXJrLmFjY291bnRzLmRldiQ"
  src="https://dynamic-peacock-66.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
  type="text/javascript"></script>


    <script>
  window.addEventListener('load', async function () {
    await Clerk.load({ ui: { ClerkUI: window.__internal_ClerkUICtor } });

    if (Clerk.isSignedIn) {
      Clerk.mountUserButton(document.getElementById('user-button'));
    } else {
      window.location.href = "/login.html";
    }
  });
</script>

</body>
</html>
